name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to deploy'
        required: true
        type: choice
        options:
          - all
          - auth-service
          - auth-frontend

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: self-hosted
    
    steps:
      - name: Set component name
        id: component
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "component=${{ inputs.component }}" >> $GITHUB_OUTPUT
          else
            echo "component=all" >> $GITHUB_OUTPUT
          fi

      - name: Pull latest images
        run: |
          COMPONENT="${{ steps.component.outputs.component }}"
          
          if [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "auth-service" ]; then
            echo "Pulling auth service image..."
            docker pull mikefluff/inite-auth-service:latest
          fi
          
          if [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "auth-frontend" ]; then
            echo "Pulling auth frontend image..."
            docker pull mikefluff/inite-auth-frontend:latest
          fi

      - name: Checkout deploy code
        uses: actions/checkout@v4
        with:
          path: inite-auth-service

      - name: Create .env file
        run: |
          cd inite-auth-service
          cat > .env << EOF
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          EOF
          echo "✅ .env file created"

      - name: Deploy services
        run: |
          cd inite-auth-service
          
          COMPONENT="${{ steps.component.outputs.component }}"
          
          if [ "$COMPONENT" = "all" ]; then
            echo "Deploying all auth services..."
            docker-compose up -d
          elif [ "$COMPONENT" = "auth-service" ]; then
            echo "Deploying auth service only..."
            docker-compose up -d --no-deps auth-service
          elif [ "$COMPONENT" = "auth-frontend" ]; then
            echo "Deploying auth frontend only..."
            docker-compose up -d --no-deps auth-frontend
          fi

      - name: Wait for database
        if: steps.component.outputs.component == 'all' || steps.component.outputs.component == 'auth-service'
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          sleep 15
          
          # Check if postgres is healthy
          docker-compose -f /home/ubuntu/smar-chat-deploy/docker-compose.yml ps auth-postgres | grep healthy || {
            echo "PostgreSQL not healthy, waiting more..."
            sleep 15
          }

      - name: Run database migrations
        if: steps.component.outputs.component == 'all' || steps.component.outputs.component == 'auth-service'
        run: |
          echo "Running database migrations..."
          docker exec inite-auth-service npm run migration:run || {
            echo "⚠️ Migrations failed or already applied"
          }

      - name: Register OAuth clients
        if: steps.component.outputs.component == 'all'
        run: |
          echo "Registering OAuth clients..."
          docker exec inite-auth-service npm run register-clients || {
            echo "⚠️ Client registration failed or already done"
          }

      - name: Create admin user
        if: steps.component.outputs.component == 'all'
        run: |
          echo "Creating admin user..."
          docker exec inite-auth-service npm run create-admin || {
            echo "⚠️ Admin user creation failed or already exists"
          }

      - name: Health checks
        run: |
          echo "Waiting for services to start..."
          sleep 20
          
          COMPONENT="${{ steps.component.outputs.component }}"
          
          if [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "auth-service" ]; then
            echo "🔍 Checking auth service health..."
            curl -f https://auth.inite.ai/health || {
              echo "❌ Auth service health check failed!"
              docker logs inite-auth-service --tail 50
              exit 1
            }
            echo "✅ Auth service is healthy"
            
            echo "🔍 Checking OIDC discovery..."
            curl -f https://auth.inite.ai/.well-known/openid-configuration || {
              echo "⚠️ OIDC discovery endpoint failed"
            }
          fi
          
          if [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "auth-frontend" ]; then
            echo "🔍 Checking auth frontend..."
            curl -f https://auth.inite.ai/ || {
              echo "❌ Auth frontend health check failed!"
              docker logs inite-auth-frontend --tail 50
              exit 1
            }
            echo "✅ Auth frontend is healthy"
          fi

      - name: Show service status
        if: always()
        run: |
          echo "=== Docker Compose Status ==="
          cd inite-auth-service
          docker-compose ps
          
          echo -e "\n=== Auth Service Logs (last 30 lines) ==="
          docker logs inite-auth-service --tail 30
          
          echo -e "\n=== Database Status ==="
          docker exec inite-auth-postgres pg_isready -U postgres || echo "Database check failed"

      - name: Cleanup old images
        if: always()
        run: |
          echo "Cleaning up old Docker images..."
          docker image prune -f --filter "until=24h"

  notify-success:
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send success notification
        run: |
          echo "🎉 Auth service deployed successfully to auth.inite.ai"
          echo "✅ All health checks passed"

  notify-failure:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        run: |
          echo "❌ Auth service deployment failed!"
          echo "Check the logs above for details"
          exit 1

