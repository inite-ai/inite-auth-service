name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: mikefluff/inite-auth-service
  FRONTEND_IMAGE: mikefluff/inite-auth-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:latest
          cache-to: type=inline

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:latest
          cache-to: type=inline

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    
    steps:
      - name: Set deployment directory
        run: |
          echo "DEPLOY_DIR=/opt/projects/inite-auth-service" >> $GITHUB_ENV

      - name: Create deployment directory
        run: |
          sudo mkdir -p $DEPLOY_DIR
          sudo chown -R $USER:$USER $DEPLOY_DIR

      - name: Checkout code to deployment directory
        uses: actions/checkout@v4
        with:
          path: ${{ env.DEPLOY_DIR }}
          clean: false

      - name: Create .env file
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          cat > .env << EOF
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          ADMIN_NAME=${{ secrets.ADMIN_NAME }}
          EOF

      - name: Pull latest images
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker pull ${{ env.BACKEND_IMAGE }}:latest
          docker pull ${{ env.FRONTEND_IMAGE }}:latest

      - name: Stop old containers
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker-compose down || true

      - name: Start services
        working-directory: ${{ env.DEPLOY_DIR }}
        run: |
          docker-compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for services to start..."
          sleep 20

      - name: Check service health
        run: |
          echo "🔍 Checking auth service health..."
          curl -f https://auth.inite.ai/health || {
            echo "❌ Health check failed!"
            docker logs inite-auth-service --tail 100
            exit 1
          }
          echo "✅ Auth service is healthy!"

      - name: Run database migrations
        run: |
          docker exec inite-auth-service npm run migration:run || {
            echo "⚠️ Migrations failed or already applied"
          }

      - name: Create admin user
        run: |
          docker exec inite-auth-service npm run create-admin || {
            echo "⚠️ Admin user already exists"
          }

      - name: Register OAuth clients
        run: |
          docker exec inite-auth-service npm run register-all-clients || {
            echo "⚠️ OAuth clients already registered"
          }

      - name: Cleanup
        run: |
          docker system prune -f

      - name: Deployment summary
        run: |
          echo "✅ Deployment successful!"
          echo "📊 Service status:"
          docker ps --filter "name=inite-auth" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "🌐 Services available at:"
          echo "   - https://auth.inite.ai"

