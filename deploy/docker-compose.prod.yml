services:
  auth-service:
    image: ${DOCKERHUB_USERNAME:-mikefluff}/inite-auth-service:latest
    container_name: inite-auth-service
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-global"
      # Backend API на отдельном домене (для обратной совместимости)
      - "traefik.http.routers.auth-api.rule=Host(`auth-api.inite.ai`)"
      - "traefik.http.routers.auth-api.entrypoints=websecure"
      - "traefik.http.routers.auth-api.tls=true"
      - "traefik.http.routers.auth-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.auth-api.service=auth-api-service"
      - "traefik.http.services.auth-api-service.loadbalancer.server.port=3002"
      # Backend API через path routing на основном домене (для SSO).
      # /v1            — все версионированные endpoints (auth/oauth/admin/...)
      # /.well-known   — OIDC discovery + JWKS + apple-app-site-association
      # /health /ready — orchestrator health probes
      # /metrics       — Prometheus scrape
      - "traefik.http.routers.auth-api-path.rule=Host(`auth.inite.ai`) && (PathPrefix(`/v1`) || PathPrefix(`/.well-known`) || PathPrefix(`/health`) || PathPrefix(`/ready`) || PathPrefix(`/metrics`))"
      - "traefik.http.routers.auth-api-path.entrypoints=websecure"
      - "traefik.http.routers.auth-api-path.tls=true"
      - "traefik.http.routers.auth-api-path.tls.certresolver=letsencrypt"
      - "traefik.http.routers.auth-api-path.priority=100"
      - "traefik.http.routers.auth-api-path.service=auth-api-service"
      # Legacy-path 308 redirect: /oauth/* /auth/* /identity/* /session/* → /v1/<same>.
      # After URI versioning these paths no longer exist on backend; serve a
      # permanent redirect so third-party clients on old SDKs get pointed at
      # the right URL instead of seeing a 404 from the Next.js frontend.
      - "traefik.http.routers.auth-api-legacy-redirect.rule=Host(`auth.inite.ai`) && (PathPrefix(`/oauth`) || PathPrefix(`/auth`) || PathPrefix(`/identity`) || PathPrefix(`/session`))"
      - "traefik.http.routers.auth-api-legacy-redirect.entrypoints=websecure"
      - "traefik.http.routers.auth-api-legacy-redirect.tls=true"
      - "traefik.http.routers.auth-api-legacy-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.auth-api-legacy-redirect.priority=90"
      - "traefik.http.routers.auth-api-legacy-redirect.middlewares=legacy-v1-redirect"
      - "traefik.http.routers.auth-api-legacy-redirect.service=auth-api-service"
      - "traefik.http.middlewares.legacy-v1-redirect.redirectregex.regex=^https?://([^/]+)/(oauth|auth|identity|session)(/.*|$$)"
      - "traefik.http.middlewares.legacy-v1-redirect.redirectregex.replacement=https://$${1}/v1/$${2}$${3}"
      - "traefik.http.middlewares.legacy-v1-redirect.redirectregex.permanent=true"
      # HTTP to HTTPS redirect для API
      - "traefik.http.routers.auth-api-http.rule=Host(`auth-api.inite.ai`)"
      - "traefik.http.routers.auth-api-http.entrypoints=web"
      - "traefik.http.routers.auth-api-http.middlewares=redirect-to-https"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - FRONTEND_URL=https://auth.inite.ai
      - SUPPORT_EMAIL=support@inite.ai
      - API_URL=https://auth-api.inite.ai
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/inite_auth
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=inite_auth
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - REFRESH_TOKEN_HMAC_SECRET=${REFRESH_TOKEN_HMAC_SECRET}
      - FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}
      - JWT_ISSUER=https://auth-api.inite.ai
      - OIDC_ISSUER=https://auth-api.inite.ai
      - CORS_ORIGINS=
      - SMTP_HOST=smtp.mailgun.org
      - SMTP_PORT=2525
      - SMTP_SECURE=false
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=auth@inite.ai
      - RP_NAME=INITE Identity
      - RP_ID=inite.ai
      - RP_ORIGIN=https://auth.inite.ai
      - DID_METHOD=key
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_NAME=${ADMIN_NAME}
      - COOKIE_DOMAIN=auth.inite.ai
      - SESSION_SECRET=${JWT_SECRET}
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - redis
    networks:
      - inite-network
      - traefik-global
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  auth-frontend:
    image: ${DOCKERHUB_USERNAME:-mikefluff}/inite-auth-frontend:latest
    container_name: inite-auth-frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-global"
      - "traefik.http.routers.auth-frontend.rule=Host(`auth.inite.ai`)"
      - "traefik.http.routers.auth-frontend.entrypoints=websecure"
      - "traefik.http.routers.auth-frontend.tls=true"
      - "traefik.http.routers.auth-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.auth-frontend.priority=10"
      - "traefik.http.services.auth-frontend.loadbalancer.server.port=3003"
      - "traefik.http.routers.auth-frontend-http.rule=Host(`auth.inite.ai`)"
      - "traefik.http.routers.auth-frontend-http.entrypoints=web"
      - "traefik.http.routers.auth-frontend-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=
      - BACKEND_URL=http://auth-service:3002
    networks:
      - traefik-global
      - inite-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: inite-auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inite_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inite-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inite-auth-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    networks:
      - inite-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  inite-network:
    driver: bridge
  traefik-global:
    external: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
