name: Deploy INITE Auth Service

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_NAME: inite-auth-service
  DOMAIN: auth.inite.ai
  API_DOMAIN: auth-api.inite.ai

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build check
      run: npm run build

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push backend
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/inite-auth-service:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/inite-auth-service:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/inite-auth-service:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/inite-auth-service:buildcache,mode=max
        platforms: linux/amd64

    - name: Build and push frontend
      uses: docker/build-push-action@v7
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        build-args: |
          NEXT_PUBLIC_API_URL=
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/inite-auth-frontend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/inite-auth-frontend:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/inite-auth-frontend:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/inite-auth-frontend:buildcache,mode=max
        platforms: linux/amd64

    - name: Build info
      run: |
        echo "✅ Docker images built and pushed successfully!"
        echo "📦 Backend: ${{ secrets.DOCKERHUB_USERNAME }}/inite-auth-service:latest"
        echo "📦 Frontend: ${{ secrets.DOCKERHUB_USERNAME }}/inite-auth-frontend:latest"
        echo "🏷️ SHA: ${{ github.sha }}"

  deploy:
    needs: build-and-push
    # Pin to the SFO self-hosted runner so this job never lands on a
    # different host that wouldn't have /opt/projects, traefik-global
    # network, or the docker volumes this deploy step expects.
    runs-on: [self-hosted, sfo]

    steps:
    - name: Checkout code
      # We need deploy/docker-compose.prod.yml from the repo on the
      # runner so we can copy it into /opt/projects/.
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Deploy to server
      run: |
        set -euo pipefail

        DEPLOY_DIR="/opt/projects/${{ env.PROJECT_NAME }}"
        mkdir -p "$DEPLOY_DIR"

        # Write .env (secrets only — compose interpolates ${VAR} from this).
        # PEM keys must be single-line (\n encoded) — otherwise the .env parser
        # treats the second line as a key=value pair and breaks every variable
        # that follows.
        {
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}"
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
          echo "JWT_PRIVATE_KEY=\"$(printf '%s' '${{ secrets.JWT_PRIVATE_KEY }}' | sed ':a;N;$!ba;s/\n/\\n/g')\""
          echo "JWT_PUBLIC_KEY=\"$(printf '%s' '${{ secrets.JWT_PUBLIC_KEY }}' | sed ':a;N;$!ba;s/\n/\\n/g')\""
          echo "REFRESH_TOKEN_HMAC_SECRET=${{ secrets.REFRESH_TOKEN_HMAC_SECRET }}"
          echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}"
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}"
          echo "ADMIN_NAME=${{ secrets.ADMIN_NAME }}"
          echo "SMTP_USER=${{ secrets.SMTP_USER }}"
          echo "SMTP_PASS=${{ secrets.SMTP_PASS }}"
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}"
        } > "$DEPLOY_DIR/.env"
        chmod 600 "$DEPLOY_DIR/.env"

        # Ship the prod compose file from the repo. Changes to
        # deploy/docker-compose.prod.yml in the repo land in prod on the
        # next deploy — no inline mirror to drift out of sync.
        cp "$GITHUB_WORKSPACE/deploy/docker-compose.prod.yml" "$DEPLOY_DIR/docker-compose.yml"

        cd "$DEPLOY_DIR"

        echo "🔄 Pulling latest Docker images..."
        docker-compose pull auth-service auth-frontend

        # Bring up infra first, then migrate against it, then bring up
        # the app. Order matters: running `migrate deploy` inside an
        # already-crashlooping container (because the schema is missing
        # the column it expects) is exactly the failure mode that took
        # us out last time.
        echo "🏗️ Starting infra (postgres, redis)..."
        docker-compose up -d postgres redis

        echo "⏳ Waiting for postgres to be healthy..."
        for i in $(seq 1 30); do
          state=$(docker inspect -f '{{.State.Health.Status}}' inite-auth-postgres 2>/dev/null || echo "starting")
          if [ "$state" = "healthy" ]; then
            echo "✅ Postgres healthy"
            break
          fi
          if [ "$i" = "30" ]; then
            echo "❌ Postgres failed to become healthy in 60s"
            docker-compose logs postgres
            exit 1
          fi
          sleep 2
        done

        # Baseline marker — the DB was created before Prisma migration
        # tracking existed, so migration 0001 already lives in the
        # schema but isn't recorded in _prisma_migrations. Mark it
        # applied so `migrate deploy` doesn't re-run and fail with P3005.
        # Idempotent: re-runs just re-acknowledge the row.
        echo "🗄️ Baselining historical migrations (idempotent)..."
        docker-compose run --rm --no-deps auth-service \
          npx prisma migrate resolve --applied 0001_convert_text_to_array || true

        echo "🗄️ Running database migrations..."
        if ! docker-compose run --rm --no-deps auth-service npx prisma migrate deploy; then
          echo "❌ Migration failed — refusing to bring app up against partial schema"
          docker-compose logs postgres
          exit 1
        fi

        echo "🚀 Starting app (auth-service, auth-frontend)..."
        docker-compose up -d auth-service auth-frontend

        echo "⏳ Polling backend /health (up to 120s)..."
        for i in $(seq 1 60); do
          if docker exec inite-auth-service wget --spider -q http://localhost:3002/health 2>/dev/null; then
            echo "✅ Backend healthy"
            break
          fi
          if [ "$i" = "60" ]; then
            echo "❌ Backend failed to respond on /health in 120s"
            docker-compose logs --tail=200 auth-service
            exit 1
          fi
          sleep 2
        done

        echo "⏳ Polling frontend (up to 60s)..."
        for i in $(seq 1 30); do
          if docker exec inite-auth-frontend wget --spider -q http://localhost:3003/ 2>/dev/null; then
            echo "✅ Frontend healthy"
            break
          fi
          if [ "$i" = "30" ]; then
            echo "❌ Frontend failed to respond in 60s"
            docker-compose logs --tail=200 auth-frontend
            exit 1
          fi
          sleep 2
        done

        # Seed admin & OAuth clients — non-fatal if they already exist,
        # but a hard failure (script crash) should still surface.
        echo "👤 Ensuring admin user..."
        docker exec inite-auth-service npm run create-admin || echo "ℹ️ Admin already exists"

        echo "🔐 Registering OAuth clients..."
        docker exec inite-auth-service npm run register-all-clients || echo "ℹ️ OAuth clients already registered"

        # Final ready probe — exercises DB + Redis end-to-end via the
        # container's published port, the way an external probe would.
        echo "🔬 Final /ready probe..."
        if ! docker exec inite-auth-service wget -q -O - http://localhost:3002/ready | grep -q '"status":"ok"'; then
          echo "❌ /ready did not report ok"
          docker exec inite-auth-service wget -q -O - http://localhost:3002/ready || true
          exit 1
        fi

        echo "✅ Deployment successful!"
        echo "🌐 https://${{ env.DOMAIN }}"

    - name: Cleanup
      if: always()
      run: |
        docker system prune -f

    - name: Notify
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "🎉 INITE Auth Service deployed successfully!"
          echo "🔗 URL: https://${{ env.DOMAIN }}"
        else
          echo "❌ Deployment failed! Check the logs above."
        fi
